name: executor-agent
role: executor
model: code-model
prompt_file: app/agents/prompts/executor_prompt.md

governance:
  can_read_fredos: conditional
  can_write_fredos: false
  can_use_exec: true
  can_access_filesystem: true
  can_access_external_connectors: conditional
  requires_retrieval_before_reasoning: true

runtime:
  session_profile: exec-enabled-session
  trust_level: high-risk-restricted
  session_persistence: minimal
  compaction_policy: keep-artifact-summary
  can_coordinate_sessions: false
  primary_handoff_targets: [operator, reviewer]

retrieval_policy:
  default_mode: B
  must_retrieve_before_action: true
  allowed_modes: [B]

output_contract:
  response_shape: execution-report
  must_include: [task_scope, commands_run, artifacts, blockers]

escalation:
  may_escalate_to: [operator, reviewer]
  requires_review_before_exec: false

tools:
  - name: retrieve_task_support
    description: Retrieve Mode B task support context before execution.
    type: http
    config:
      method: GET
      url: "http://localhost:8000/api/retrieve/task-support/{task_id}"
    parameters:
      - name: task_id
        type: integer
        required: true

  - name: exec
    description: Execute tightly scoped local commands required to complete an approved task.
    type: builtin
