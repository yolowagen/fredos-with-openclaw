name: operator-agent
role: operator
model: large-model
prompt_file: app/agents/prompts/operator_prompt.md

governance:
  can_read_fredos: true
  can_write_fredos: true
  can_use_exec: false
  can_access_filesystem: false
  can_access_external_connectors: true
  requires_retrieval_before_reasoning: true

runtime:
  session_profile: tool-coordination-session
  trust_level: trusted-write-governed
  session_persistence: compactable
  compaction_policy: keep-mutation-summary
  can_coordinate_sessions: true
  primary_handoff_targets: [memory_manager, reviewer, executor]

retrieval_policy:
  default_mode: A
  must_retrieve_before_action: true
  allowed_modes: [A, B]

output_contract:
  response_shape: mutation-report
  must_include: [retrieval_source, mutation_target, mutation_result, review_status]

escalation:
  may_escalate_to: [memory_manager, reviewer, executor]
  requires_review_before_exec: true

tools:
  - name: list_projects
    description: List projects before choosing the target scope for a durable write.
    type: http
    config:
      method: GET
      url: "http://localhost:8000/api/projects"

  - name: retrieve_project_overview
    description: Retrieve Mode A overview before mutating task state or logging operations.
    type: http
    config:
      method: GET
      url: "http://localhost:8000/api/retrieve/project-overview/{project_id}"
    parameters:
      - name: project_id
        type: integer
        required: true

  - name: fredos_write_structured
    description: Create a governed durable record in FredOS.
    type: http
    config:
      method: POST
      url: "http://localhost:8000/api/fredos/write-structured"

  - name: fredos_update_task
    description: Update structured task state through the governed wrapper.
    type: http
    config:
      method: PATCH
      url: "http://localhost:8000/api/fredos/tasks/{task_id}"
    parameters:
      - name: task_id
        type: integer
        required: true
